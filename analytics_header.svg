<svg width="900" height="80" viewBox="0 0 900 80" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
@keyframes borderFlow {
  0%   { stroke-dashoffset: 2000 }
  100% { stroke-dashoffset: 0 }
}
@keyframes glow1 { 0%,100%{filter:drop-shadow(0 0 6px #58a6ff) drop-shadow(0 0 14px #58a6ff)} 50%{filter:drop-shadow(0 0 16px #58a6ff) drop-shadow(0 0 32px #58a6ff) drop-shadow(0 0 48px #58a6ff)} }
@keyframes glow2 { 0%,100%{filter:drop-shadow(0 0 5px #FFD700) drop-shadow(0 0 12px #FFD700)} 50%{filter:drop-shadow(0 0 14px #FFD700) drop-shadow(0 0 28px #FFD700)} }
@keyframes fadeIn { from{opacity:0;transform:translateX(-20px)} to{opacity:1;transform:translateX(0)} }
@keyframes scanH  { 0%{transform:translateX(-100%)} 100%{transform:translateX(110%)} }
@keyframes pulse  { 0%,100%{opacity:.5} 50%{opacity:1} }
@keyframes rgbBorder { 0%{stroke:#58a6ff} 25%{stroke:#00d4ff} 50%{stroke:#a78bfa} 75%{stroke:#FFD700} 100%{stroke:#58a6ff} }
</style>
<linearGradient id="hbg" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%"   stop-color="#0a0e1a"/>
  <stop offset="50%"  stop-color="#0f172a"/>
  <stop offset="100%" stop-color="#0a0e1a"/>
</linearGradient>
<linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%"   stop-color="#58a6ff"/>
  <stop offset="50%"  stop-color="#00d4ff"/>
  <stop offset="100%" stop-color="#a78bfa"/>
</linearGradient>
<clipPath id="clip"><rect width="900" height="80" rx="12"/></clipPath>
</defs>

<rect width="900" height="80" fill="url(#hbg)" rx="12"/>

<!-- Animated RGB border -->
<rect x="1.5" y="1.5" width="897" height="77" fill="none" rx="11"
  stroke="#58a6ff" stroke-width="2" stroke-dasharray="2000"
  style="animation:borderFlow 3s linear forwards, rgbBorder 4s linear infinite"/>

<!-- Shimmer sweep -->
<rect width="200" height="80" fill="white" opacity="0.03" rx="0"
  clip-path="url(#clip)"
  style="animation:scanH 4s ease-in-out infinite"/>

<!-- Left accent bar -->
<rect x="0" y="14" width="4" height="52" rx="2" fill="#58a6ff"
  style="animation:glow1 2.5s ease-in-out infinite"/>

<!-- Right accent bar -->
<rect x="896" y="14" width="4" height="52" rx="2" fill="#FFD700"
  style="animation:glow2 2.5s ease-in-out infinite"/>

<!-- Corner dots TL -->
<circle cx="16" cy="16" r="4" fill="#58a6ff" style="animation:pulse 1.5s ease-in-out infinite"/>
<circle cx="30" cy="16" r="3" fill="#00d4ff" opacity=".6" style="animation:pulse 1.8s ease-in-out infinite .3s"/>

<!-- Corner dots TR -->
<circle cx="884" cy="16" r="4" fill="#FFD700" style="animation:pulse 1.5s ease-in-out infinite .5s"/>
<circle cx="870" cy="16" r="3" fill="#fbbf24" opacity=".6" style="animation:pulse 1.8s ease-in-out infinite .8s"/>

<!-- Corner dots BL -->
<circle cx="16" cy="64" r="4" fill="#a78bfa" style="animation:pulse 2s ease-in-out infinite .2s"/>

<!-- Corner dots BR -->
<circle cx="884" cy="64" r="4" fill="#22c55e" style="animation:pulse 2s ease-in-out infinite .7s"/>

<!-- Icon -->
<text x="22" y="47" font-size="26" style="animation:fadeIn .6s ease both">📊</text>

<!-- Main Title -->
<text x="450" y="36" text-anchor="middle" fill="url(#textGrad)"
  font-family="'Courier New',Courier,monospace" font-size="22" font-weight="bold" letter-spacing="3"
  style="animation:fadeIn .5s ease .1s both, glow1 3s ease-in-out infinite">
  GITHUB ANALYTICS
</text>

<!-- Subtitle -->
<text x="450" y="56" text-anchor="middle" fill="#475569"
  font-family="'Courier New',Courier,monospace" font-size="11" letter-spacing="4"
  style="animation:fadeIn .5s ease .3s both">
  COMMITS · STREAKS · LANGUAGES · TROPHIES
</text>

<!-- Right icon -->
<text x="878" y="47" text-anchor="end" font-size="26"
  style="animation:fadeIn .6s ease .2s both">⚡</text>

</svg>