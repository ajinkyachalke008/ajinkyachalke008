<svg width="900" height="80" viewBox="0 0 900 80" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
@keyframes borderFlow { 0%{stroke-dashoffset:2000} 100%{stroke-dashoffset:0} }
@keyframes glowG  { 0%,100%{filter:drop-shadow(0 0 6px #22c55e) drop-shadow(0 0 14px #22c55e)} 50%{filter:drop-shadow(0 0 16px #22c55e) drop-shadow(0 0 32px #22c55e)} }
@keyframes glowO  { 0%,100%{filter:drop-shadow(0 0 5px #f97316)} 50%{filter:drop-shadow(0 0 14px #f97316) drop-shadow(0 0 28px #f97316)} }
@keyframes fadeIn { from{opacity:0;transform:translateX(-20px)} to{opacity:1;transform:translateX(0)} }
@keyframes scanH  { 0%{transform:translateX(-100%)} 100%{transform:translateX(110%)} }
@keyframes pulse  { 0%,100%{opacity:.5} 50%{opacity:1} }
@keyframes rgbB   { 0%{stroke:#22c55e} 33%{stroke:#00FF41} 66%{stroke:#f97316} 100%{stroke:#22c55e} }
</style>
<linearGradient id="hbg2" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%"   stop-color="#0a0e1a"/>
  <stop offset="50%"  stop-color="#0c1a0f"/>
  <stop offset="100%" stop-color="#0a0e1a"/>
</linearGradient>
<linearGradient id="tG2" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%"   stop-color="#22c55e"/>
  <stop offset="50%"  stop-color="#00FF41"/>
  <stop offset="100%" stop-color="#86efac"/>
</linearGradient>
<clipPath id="clip2"><rect width="900" height="80" rx="12"/></clipPath>
</defs>

<rect width="900" height="80" fill="url(#hbg2)" rx="12"/>
<rect x="1.5" y="1.5" width="897" height="77" fill="none" rx="11"
  stroke="#22c55e" stroke-width="2" stroke-dasharray="2000"
  style="animation:borderFlow 3s linear forwards, rgbB 4s linear infinite"/>

<rect width="200" height="80" fill="white" opacity="0.03"
  clip-path="url(#clip2)"
  style="animation:scanH 4s ease-in-out infinite"/>

<rect x="0" y="14" width="4" height="52" rx="2" fill="#22c55e"
  style="animation:glowG 2.5s ease-in-out infinite"/>
<rect x="896" y="14" width="4" height="52" rx="2" fill="#f97316"
  style="animation:glowO 2.5s ease-in-out infinite"/>

<circle cx="16" cy="16" r="4" fill="#22c55e" style="animation:pulse 1.5s ease-in-out infinite"/>
<circle cx="30" cy="16" r="3" fill="#00FF41" opacity=".6" style="animation:pulse 1.8s ease-in-out infinite .3s"/>
<circle cx="884" cy="16" r="4" fill="#f97316" style="animation:pulse 1.5s ease-in-out infinite .5s"/>
<circle cx="16" cy="64" r="4" fill="#86efac" style="animation:pulse 2s ease-in-out infinite .2s"/>
<circle cx="884" cy="64" r="4" fill="#fbbf24" style="animation:pulse 2s ease-in-out infinite .7s"/>

<text x="22" y="47" font-size="26" style="animation:fadeIn .6s ease both">📈</text>

<text x="450" y="36" text-anchor="middle" fill="url(#tG2)"
  font-family="'Courier New',Courier,monospace" font-size="22" font-weight="bold" letter-spacing="3"
  style="animation:fadeIn .5s ease .1s both, glowG 3s ease-in-out infinite">
  CONTRIBUTION ACTIVITY
</text>
<text x="450" y="56" text-anchor="middle" fill="#374151"
  font-family="'Courier New',Courier,monospace" font-size="11" letter-spacing="4"
  style="animation:fadeIn .5s ease .3s both">
  DAILY COMMITS · PULL REQUESTS · ISSUES · CODE REVIEWS
</text>

<text x="878" y="47" text-anchor="end" font-size="26"
  style="animation:fadeIn .6s ease .2s both">🔥</text>
</svg>