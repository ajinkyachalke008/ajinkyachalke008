<svg width="860" height="460" viewBox="0 0 860 460" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
@keyframes blink   { 0%,49%{opacity:1} 50%,100%{opacity:0} }
@keyframes scan    { 0%{transform:translateY(52px)} 100%{transform:translateY(460px)} }
@keyframes glowC   { 0%,100%{opacity:1;filter:drop-shadow(0 0 4px #00d4ff)} 50%{opacity:0.75;filter:drop-shadow(0 0 12px #00d4ff) drop-shadow(0 0 20px #00d4ff)} }
@keyframes glowG   { 0%,100%{opacity:0.85;filter:drop-shadow(0 0 4px #00FF41)} 50%{opacity:1;filter:drop-shadow(0 0 12px #00FF41) drop-shadow(0 0 22px #00FF41)} }
@keyframes glowO   { 0%,100%{opacity:1;filter:drop-shadow(0 0 3px #f97316)} 50%{opacity:0.8;filter:drop-shadow(0 0 10px #f97316)} }
@keyframes pulse   { 0%,100%{opacity:0.5} 50%{opacity:1} }
@keyframes fadeUp  { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
@keyframes colorShift { 0%{fill:#58a6ff} 33%{fill:#00d4ff} 66%{fill:#a78bfa} 100%{fill:#58a6ff} }
@keyframes borderPulse { 0%,100%{stroke-width:1.5;opacity:0.5} 50%{stroke-width:2.5;opacity:0.9} }
@keyframes scanbarMove { 0%{opacity:0.08;transform:translateY(52px)} 100%{opacity:0;transform:translateY(460px)} }
@keyframes promptBlink { 0%,80%,100%{fill:#f97316} 85%{fill:#ff6b35} }
</style>

<filter id="cglow">
  <feGaussianBlur stdDeviation="3" result="b"/>
  <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<filter id="gglow">
  <feGaussianBlur stdDeviation="4" result="b"/>
  <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<filter id="softglow">
  <feGaussianBlur stdDeviation="2" result="b"/>
  <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>

<linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
  <stop offset="0%"   stop-color="#0d1117"/>
  <stop offset="100%" stop-color="#060912"/>
</linearGradient>
<linearGradient id="titlebar" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%"   stop-color="#0d1117"/>
  <stop offset="50%"  stop-color="#111827"/>
  <stop offset="100%" stop-color="#0d1117"/>
</linearGradient>
<linearGradient id="lineHighlight" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%"   stop-color="#00FF41" stop-opacity="0.06"/>
  <stop offset="100%" stop-color="#00FF41" stop-opacity="0"/>
</linearGradient>
</defs>

