<svg width="900" height="490" viewBox="0 0 900 490"
     xmlns="http://www.w3.org/2000/svg">
<defs>

<!-- ── Keyframes ─────────────────────────────────────────────── -->
<style>
@keyframes blink      { 0%,49%{opacity:1}50%,100%{opacity:0} }
@keyframes scanMove   { 0%{transform:translateY(54px)}100%{transform:translateY(490px)} }
@keyframes borderPulse{ 0%,100%{stroke-opacity:.45;stroke-width:1.8}
                         50%{stroke-opacity:1;stroke-width:2.8} }
@keyframes greenBreathe{ 0%,100%{filter:drop-shadow(0 0 5px #00FF41) drop-shadow(0 0 12px #00FF41)}
                           50%{filter:drop-shadow(0 0 14px #00FF41) drop-shadow(0 0 28px #00FF41) drop-shadow(0 0 42px #00FF41)} }
@keyframes cyanPulse  { 0%,100%{filter:drop-shadow(0 0 4px #00d4ff) drop-shadow(0 0 10px #00d4ff)}
                          50%{filter:drop-shadow(0 0 12px #00d4ff) drop-shadow(0 0 24px #00d4ff) drop-shadow(0 0 36px #00d4ff)} }
@keyframes orangeGlow { 0%,100%{filter:drop-shadow(0 0 4px #f97316) drop-shadow(0 0 9px #f97316)}
                          50%{filter:drop-shadow(0 0 11px #f97316) drop-shadow(0 0 22px #f97316)} }
@keyframes dotPulse   { 0%,100%{r:5;opacity:.7}50%{r:7;opacity:1} }
@keyframes fadeSlide  { from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)} }
@keyframes shimmer    { 0%{stop-color:#0d1117}50%{stop-color:#141e2e}100%{stop-color:#0d1117} }
@keyframes rgbShift   { 0%{fill:#58a6ff}25%{fill:#a78bfa}50%{fill:#00d4ff}75%{fill:#38bdf8}100%{fill:#58a6ff} }
</style>

<!-- ── Filters ────────────────────────────────────────────────── -->
<filter id="fGreen" x="-30%" y="-30%" width="160%" height="160%">
  <feGaussianBlur stdDeviation="5" result="b1"/>
  <feGaussianBlur stdDeviation="12" result="b2"/>
  <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<filter id="fCyan" x="-30%" y="-30%" width="160%" height="160%">
  <feGaussianBlur stdDeviation="4" result="b1"/>
  <feGaussianBlur stdDeviation="10" result="b2"/>
  <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<filter id="fOrange" x="-30%" y="-30%" width="160%" height="160%">
  <feGaussianBlur stdDeviation="4" result="b1"/>
  <feGaussianBlur stdDeviation="9" result="b2"/>
  <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<filter id="fSoft" x="-20%" y="-20%" width="140%" height="140%">
  <feGaussianBlur stdDeviation="3" result="b"/>
  <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>

<!-- ── Gradients ─────────────────────────────────────────────── -->
<linearGradient id="bgGrad" x1="0" y1="0" x2=".2" y2="1">
  <stop offset="0%"   stop-color="#0d1420"><animate attributeName="stop-color" values="#0d1420;#111827;#0d1420" dur="8s" repeatCount="indefinite"/></stop>
  <stop offset="100%" stop-color="#060912"/>
</linearGradient>
<linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%"   stop-color="#0a0e1a"/>
  <stop offset="50%"  stop-color="#0f172a"/>
  <stop offset="100%" stop-color="#0a0e1a"/>
</linearGradient>
<linearGradient id="rowGlow" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%"   stop-color="#00FF41" stop-opacity=".09"/>
  <stop offset="40%"  stop-color="#00FF41" stop-opacity=".04"/>
  <stop offset="100%" stop-color="#00FF41" stop-opacity="0"/>
</linearGradient>
<linearGradient id="borderGrad" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0%"   stop-color="#00FF41"/>
  <stop offset="50%"  stop-color="#00d4ff"/>
  <stop offset="100%" stop-color="#00FF41"/>
</linearGradient>

</defs>

<!-- ── Background ────────────────────────────────────────────── -->
<rect width="900" height="490" fill="url(#bgGrad)" rx="16"/>

<!-- ── Animated border ───────────────────────────────────────── -->
<rect x="1.5" y="1.5" width="897" height="487" fill="none"
      stroke="url(#borderGrad)" stroke-width="2" rx="15"
      style="animation:borderPulse 3s ease-in-out infinite"/>
<rect x="4" y="4" width="892" height="482" fill="none"
      stroke="#00d4ff" stroke-width=".4" rx="13" opacity=".12"/>

<!-- ── Title bar ─────────────────────────────────────────────── -->
<rect x="0" y="0" width="900" height="54" fill="url(#titleGrad)" rx="16"/>
<rect x="0" y="42" width="900" height="12" fill="url(#titleGrad)"/>
