<svg width="820" height="400" viewBox="0 0 820 400" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
@keyframes blink   { 0%,49%{opacity:1} 50%,100%{opacity:0} }
@keyframes scan    { 0%{transform:translateY(44px)} 100%{transform:translateY(400px)} }
@keyframes glow    { 0%,100%{filter:drop-shadow(0 0 3px #00d4ff)} 50%{filter:drop-shadow(0 0 8px #00d4ff) drop-shadow(0 0 14px #00d4ff)} }
@keyframes glowG   { 0%,100%{filter:drop-shadow(0 0 3px #00FF41)} 50%{filter:drop-shadow(0 0 9px #00FF41) drop-shadow(0 0 18px #00FF41)} }
@keyframes pulse   { 0%,100%{opacity:1} 50%{opacity:0.6} }
@keyframes flicker { 0%,94%,96%,100%{opacity:1} 95%{opacity:0.3} }
@keyframes slide   { 0%{stroke-dashoffset:100} 100%{stroke-dashoffset:0} }
</style>

<!-- Outer glow gradient -->
<filter id="outerGlow">
  <feGaussianBlur stdDeviation="3" result="blur"/>
  <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<filter id="greenGlow">
  <feGaussianBlur stdDeviation="2.5" result="blur"/>
  <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>

<!-- Background gradient -->
<linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0%" stop-color="#0a0e1a"/>
  <stop offset="100%" stop-color="#060912"/>
</linearGradient>
</defs>

