.lbl{fill:#00d4ff;font-weight:bold}
.prompt{fill:#f97316;font-weight:bold}
.cursor{fill:#00FF41;animation:blink 1s step-end infinite}
.scanline{fill:none;stroke:#00FF41;stroke-width:1;opacity:0.07;animation:scan 4s linear infinite}
.glow{filter:drop-shadow(0 0 4px #00FF41)}
.border{fill:none;stroke:#00FF41;stroke-width:1;opacity:0.25}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
@keyframes scan{0%{transform:translateY(0)}100%{transform:translateY(390px)}}
@keyframes flicker{0%,96%,100%{opacity:1}97%{opacity:0.4}}
</style>
